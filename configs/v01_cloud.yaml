# WorldJEPA v0.1 — A100 Cloud Config
encoder_model: vjepa2_vit_large
freeze_encoder: false
latent_dim: 1024
predictor_hidden: 384
predictor_layers: 12
predictor_heads: 6
lambda_sigreg: 0.1
num_projections: 1024
num_frames: 16
resolution: 224
epochs: 100
batch_size: 32
lr: 1.0e-4
weight_decay: 1.0e-5
log_every: 50
save_dir: checkpoints/cloud
save_every: 10
